# @package _global_

defaults:
  - /habitat: habitat_config_base
  - /habitat/task: vln_r2r
  - /habitat/simulator/agents@habitat.simulator.agents.main_agent: rgbd_agent
  - /habitat/dataset/vln: mp3d_r2r
  - /habitat/task/lab_sensors:
    - gps_sensor
    - compass_sensor
  - _self_

habitat:
  environment:
    max_episode_steps: 500
    iterator_options:
      max_scene_repeat_steps: 50000
      shuffle: False
      
  simulator:
    agents:
      main_agent:
        sim_sensors:
          rgb_sensor:
            width: 640
            height: 480
            hfov: 79
            noise_model: "OverexposureNoiseModel"
            noise_model_kwargs:
              # ============================================
              # 方法1: 手动调整参数（推荐用于精细控制）
              # ============================================
              exposure: 2.0                        # 🎯 核心参数！控制曝光倍数
                                                  # 1.0  = 正常曝光
                                                  # 1.5  = 轻微过曝
                                                  # 2.5  = 中度过曝
                                                  # 4.0  = 严重过曝
                                                  # 8.0  = 极度过曝
              
              gain: 1.35                          # 传感器增益 (ISO/100)
                                                  # 1.0 = ISO 100
                                                  # 2.0 = ISO 200
                                                  # 4.0 = ISO 400
                                                  # 8.0 = ISO 800
              
              full_well: 0.925                    # 传感器饱和值（线性域最大值）
                                                  # 1.0 = 标准饱和点
                                                  # 0.9 = 提前饱和（更容易过曝）
                                                  # 0.8 = 低饱和点
              
              sigma_read: 0.0125                 # 读出噪声标准差
                                                  # 0.005 = 低噪声
                                                  # 0.015 = 中等噪声
                                                  # 0.03  = 高噪声
              
              gamma: 2.1                         # 伽马校正值
                                                  # 2.2 = 标准sRGB
                                                  # 1.8 = 更亮的图像
                                                  # 2.4 = 更暗的图像
              
              overexposure_type: "light_moderate"      # 过曝光类型预设
                                                  # normal/slight/light_moderate/moderate/severe/extreme
              
              wavelength_effect: true            # 启用波长相关效应
                                                  # true = 不同颜色通道响应不同
              
              bloom_strength: 0.2                # 光晕效果强度 (0-1)
                                                  # 0 = 无光晕
                                                  # 0.3 = 中等光晕
                                                  # 0.7 = 强光晕
              
              highlight_rolloff: true           # 启用高光溢出效果
              
          depth_sensor:
            width: 640
            height: 480
            hfov: 79
            min_depth: 0.0
            max_depth: 10.0
            
    forward_step_size: 0.25
    turn_angle: 15
    habitat_sim_v0:
      gpu_device_id: 0
    
  task:
    measurements:
      distance_to_goal:
        type: DistanceToGoal
        distance_to: POINT
      success:
        type: Success
        success_distance: 3.0
      spl:
        type: SPL
      # oracle_success:
      #   type: OracleSuccess
      # oracle_navigation_error:
      #   type: OracleNavigationError
        
  dataset:
    type: R2RVLN-v1
    split: val_seen
    scenes_dir: data/scene_datasets/
    data_path: data/datasets/r2r/{split}/{split}.json.gz


